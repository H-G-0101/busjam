    <style>
        html, body {
            overflow: hidden;
            width   : 100%;
            height  : 100%;
            margin  : 0;
            padding : 0;

            -webkit-touch-callout: none !important;                /* prevent callout to copy image, etc when tap to hold */
            -webkit-text-size-adjust: none !important;             /* prevent webkit from resizing text to fit */
            -webkit-user-select: none !important;                  /* prevent copy paste, to allow, change 'none' to 'text' */
        }

        #renderCanvas {
            width   : 100%;
            height  : 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            border: none;
        }
    </style>








    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body.ad-showing {
            overflow: visible !important;
        }
    </style>


    <style>
        #loadingScreen{
            position:fixed; inset:0; z-index:99999;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            background:linear-gradient(180deg,#5AAEEB 0%,#7FC3F2 45%,#69BE8C 46%,#4FA873 100%);
            font-family:"Segoe UI",system-ui,-apple-system,"Arial Black",sans-serif;
            overflow:hidden; -webkit-tap-highlight-color:transparent;
        }
        #loadingScreen .bj-bus{ font-size:64px; animation:bjbounce 1s ease-in-out infinite; filter:drop-shadow(0 8px 6px rgba(0,0,0,.25)); }
        @keyframes bjbounce{ 0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(-14px) rotate(3deg);} }
        #loadingScreen .bj-word{
            margin:14px 0 4px; font-weight:900; font-size:72px; letter-spacing:2px; color:#FFCE3A; line-height:.95;
            text-shadow:-3px -3px 0 #8B3A0E,3px -3px 0 #8B3A0E,-3px 3px 0 #8B3A0E,3px 3px 0 #8B3A0E,0 6px 0 #6E2D0A,0 12px 16px rgba(0,0,0,.35);
        }
        #loadingScreen .bj-sub{ font-weight:900; font-size:40px; letter-spacing:3px; color:#FFF6E6; margin-bottom:34px;
            text-shadow:-2px -2px 0 #C45A14,2px -2px 0 #C45A14,-2px 2px 0 #C45A14,2px 2px 0 #C45A14,0 5px 0 #9E4810,0 10px 12px rgba(0,0,0,.3); }
        #loadingScreen .bj-track{ width:min(72vw,360px); height:24px; background:rgba(0,0,0,.20); border:3px solid rgba(255,255,255,.7);
            border-radius:20px; overflow:hidden; box-shadow:0 5px 12px rgba(0,0,0,.22), inset 0 2px 4px rgba(0,0,0,.25); }
        #loadingScreen .bj-fill{ height:100%; width:0%; border-radius:20px; background:linear-gradient(180deg,#FFE873,#FF9E2C);
            box-shadow:inset 0 2px 2px rgba(255,255,255,.6); transition:width .25s ease; }
        #loadingScreen .bj-pct{ margin-top:12px; font-weight:800; font-size:18px; color:#fff; letter-spacing:1px; text-shadow:0 2px 4px rgba(0,0,0,.3); }
        #loadingScreen .bj-tap{ display:none; margin-top:10px; font-weight:900; font-size:26px; letter-spacing:2px; color:#fff; text-shadow:0 3px 7px rgba(0,0,0,.4); animation:bjpulse 1.1s ease-in-out infinite; }
        @keyframes bjpulse{ 0%,100%{opacity:.55; transform:scale(1);} 50%{opacity:1; transform:scale(1.07);} }

        /* ===== Loja de Moedas (anuncios) ===== */
        #freeCoinsModal{ position:fixed; inset:0; z-index:2000; display:none; align-items:center; justify-content:center;
            background:rgba(0,0,0,.62); font-family:Arial,Helvetica,sans-serif; -webkit-tap-highlight-color:transparent; }
        #freeCoinsModal .sh-card{ position:relative; width:min(90vw,400px); max-height:86vh; display:flex; flex-direction:column;
            background:linear-gradient(180deg,#1F6FB2,#15598F); border:5px solid #fff; border-radius:28px;
            box-shadow:0 14px 44px rgba(0,0,0,.5); animation:fcpop .28s cubic-bezier(.2,1.3,.5,1) both; overflow:hidden; }
        @keyframes fcpop{ 0%{ transform:scale(.7); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
        #freeCoinsModal .sh-head{ position:relative; padding:16px 18px 14px; background:linear-gradient(180deg,#2C86CE,#1F6FB2);
            display:flex; align-items:center; justify-content:center; border-bottom:3px solid rgba(0,0,0,.15); }
        #freeCoinsModal .sh-head .sh-title{ font-size:26px; font-weight:900; color:#fff; letter-spacing:2px; text-shadow:0 3px 4px rgba(0,0,0,.3); }
        #freeCoinsModal .sh-bal{ position:absolute; left:14px; top:50%; transform:translateY(-50%); display:flex; align-items:center; gap:7px;
            background:rgba(0,0,0,.22); border-radius:20px; padding:5px 12px 5px 6px; }
        #freeCoinsModal .sh-bal .coin{ width:24px; height:24px; border-radius:50%;
            background:radial-gradient(circle at 35% 30%,#FFE680,#F2B100 72%); border:2px solid #E59400; box-shadow:inset 0 -2px 3px rgba(0,0,0,.2); }
        #freeCoinsModal .sh-bal span{ font-size:17px; font-weight:800; color:#fff; }
        #freeCoinsModal .sh-close{ position:absolute; right:12px; top:50%; transform:translateY(-50%); width:40px; height:40px; border-radius:50%;
            background:rgba(255,255,255,.18); color:#fff; font-size:22px; font-weight:900; line-height:40px; text-align:center; cursor:pointer; }
        #freeCoinsModal .sh-list{ padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }
        #freeCoinsModal .sh-pack{ display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:22px;
            background:linear-gradient(180deg,#EAF4FF,#CFE6FB); border:4px solid #fff; box-shadow:0 6px 14px rgba(0,0,0,.22); }
        #freeCoinsModal .sh-pack .pk-coins{ display:flex; align-items:center; gap:9px; flex:1; }
        #freeCoinsModal .sh-pack .pk-pile{ position:relative; width:54px; height:54px; flex:none; border-radius:50%;
            background:radial-gradient(circle at 35% 28%,#FFE680,#F2B100 72%); border:4px solid #E59400; box-shadow:0 4px 8px rgba(0,0,0,.25), inset 0 -4px 6px rgba(0,0,0,.18); }
        #freeCoinsModal .sh-pack .pk-pile::after{ content:"P"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
            font-size:24px; font-weight:900; color:#C98300; text-shadow:0 1px 0 rgba(255,255,255,.5); }
        #freeCoinsModal .sh-pack .pk-amt{ font-size:27px; font-weight:900; color:#1C4E78; text-shadow:0 1px 0 rgba(255,255,255,.6); }
        #freeCoinsModal .sh-btn{ flex:none; min-width:104px; padding:13px 12px; font-size:18px; font-weight:900; color:#fff;
            background:linear-gradient(180deg,#3FBF4A,#2A9E37); border:3px solid #fff; border-radius:18px;
            box-shadow:0 5px 0 #1F7A29,0 8px 14px rgba(0,0,0,.28); text-shadow:0 2px 2px rgba(0,0,0,.3); cursor:pointer; transition:transform .06s;
            display:flex; align-items:center; justify-content:center; gap:6px; }
        #freeCoinsModal .sh-btn .ad{ font-size:11px; font-weight:900; background:#fff; color:#2A9E37; border-radius:5px; padding:2px 5px; letter-spacing:.5px; }
        #freeCoinsModal .sh-btn:active{ transform:translateY(3px); box-shadow:0 2px 0 #1F7A29,0 5px 10px rgba(0,0,0,.28); }
        #freeCoinsModal .sh-btn:disabled{ filter:grayscale(.4); opacity:.7; cursor:default; }
        #freeCoinsModal .sh-pack.free{ background:linear-gradient(180deg,#FFF4D6,#FFE39E); }
        /* overlay de carregamento de anuncio */
        #shLoadingAd{ position:fixed; inset:0; z-index:2100; display:none; flex-direction:column; align-items:center; justify-content:center;
            background:rgba(0,0,0,.8); color:#fff; font-family:Arial,Helvetica,sans-serif; -webkit-tap-highlight-color:transparent; }
        #shLoadingAd .sp{ width:56px; height:56px; border:6px solid rgba(255,255,255,.25); border-top-color:#3FBF4A; border-radius:50%; animation:shspin .8s linear infinite; }
        @keyframes shspin{ to{ transform:rotate(360deg); } }
        #shLoadingAd .txt{ margin-top:18px; font-size:20px; font-weight:800; letter-spacing:1px; text-shadow:0 2px 4px rgba(0,0,0,.4); }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="bj-bus">&#128652;</div>
        <div class="bj-word">BUS</div>
        <div class="bj-sub">JAM</div>
        <div class="bj-track" id="bjTrack"><div class="bj-fill" id="bjFill"></div></div>
        <div class="bj-pct" id="bjPct">0%</div>
        <div class="bj-tap" id="bjTap">TAP TO CONTINUE</div>
    </div>
    <script>
    (function(){
        var p=0, fill, pct, scr, track, tap, timer, ready=false, gone=false;
        function setBar(v){ if(fill)fill.style.width=v+"%"; if(pct)pct.textContent=Math.round(v)+"%"; }
        function start(){
            fill=document.getElementById("bjFill"); pct=document.getElementById("bjPct");
            scr=document.getElementById("loadingScreen"); track=document.getElementById("bjTrack"); tap=document.getElementById("bjTap");
            timer=setInterval(function(){ if(ready)return; p+=Math.max(.3,(90-p)*0.035); if(p>90)p=90; setBar(p); },110);
        }
        /* progresso real dos assets */
        window.__bjReal=function(v){ if(ready)return; var t=30+(+v||0)*0.62; if(t>p)p=t>92?92:t; setBar(p); };
        function onTap(){
            if(gone)return; gone=true;
            try{ if(window.__bjContinue) window.__bjContinue(); }catch(e){}   /* dispara a funcao original do jogo (dentro do gesto -> audio destrava) */
            if(scr){ scr.style.transition="opacity .45s ease"; scr.style.opacity="0"; setTimeout(function(){ scr.style.display="none"; },470); }
        }
        /* carregamento concluido -> vira TAP TO CONTINUE */
        window.__bjReady=function(){
            if(ready)return; ready=true; clearInterval(timer); setBar(100);
            setTimeout(function(){
                if(track)track.style.display="none"; if(pct)pct.style.display="none";
                if(tap)tap.style.display="block";
                if(scr){ scr.style.cursor="pointer"; scr.addEventListener("click",onTap,{once:true}); scr.addEventListener("touchend",onTap,{once:true}); }
            },250);
        };
        /* failsafe duro: esconde tudo (ultimo recurso) */
        window.__bjDone=function(){ if(gone)return; gone=true; if(scr){ scr.style.opacity="0"; setTimeout(function(){ scr.style.display="none"; },470); } };
        if(document.readyState!=="loading") start(); else document.addEventListener("DOMContentLoaded",start);
        setTimeout(function(){ if(!ready && window.__bjReady)window.__bjReady(); },20000); /* failsafe: arma o tap */
    })();
    </script>

    <!-- ===== Loja de Moedas (anuncios) ===== -->
    <div id="freeCoinsModal">
        <div class="sh-card">
            <div class="sh-head">
                <div class="sh-bal"><div class="coin"></div><span id="shBal">0</span></div>
                <div class="sh-title">STORE</div>
                <div class="sh-close" id="shClose">&#10005;</div>
            </div>
            <div class="sh-list" id="shList"></div>
        </div>
    </div>
    <div id="shLoadingAd"><div class="sp"></div><div class="txt" id="shLoadTxt">Loading ad...</div></div>
    <script>
    (function(){
        /* ===== pacotes: moedas por N anuncios (mude aqui) ===== */
        var PACKS = [
            { coins:100,  ads:1 },
            { coins:300,  ads:2 },
            { coins:700,  ads:4 },
            { coins:1500, ads:8 }
        ];
        var modal, list, balEl, loadEl, loadTxt, busy=false;

        function adLabel(n){ return n+" AD"+(n>1?"S":""); }
        function refreshBal(){ if(balEl) balEl.textContent = (window.PlayerCash|0); }
        function showLoad(t){ if(loadTxt) loadTxt.textContent=t||"Loading ad..."; if(loadEl) loadEl.style.display="flex"; }
        function hideLoad(){ if(loadEl) loadEl.style.display="none"; }

        function buyPack(pack, btn){
            if(busy) return; busy=true;
            if(btn) btn.disabled=true;
            var watched=0;
            function step(){
                if(watched>=pack.ads){            /* todos os anuncios vistos -> credita */
                    if(window.__bjAddCoins) window.__bjAddCoins(pack.coins);
                    refreshBal(); hideLoad(); busy=false; resetBtn(btn, pack);
                    return;
                }
                showLoad("Loading ad "+(watched+1)+"/"+pack.ads);
                var t0=Date.now();
                if(window.__bjWatchAd){
                    window.__bjWatchAd(function(ok){
                        /* garante o overlay visivel por ~1s (sensacao de anuncio) */
                        var wait=Math.max(0, 1000-(Date.now()-t0));
                        setTimeout(function(){
                            if(ok){ watched++; step(); }
                            else { hideLoad(); busy=false; resetBtn(btn, pack); }  /* desistiu: nao credita */
                        }, wait);
                    });
                } else { hideLoad(); busy=false; resetBtn(btn, pack); }
            }
            step();
        }
        function resetBtn(btn, pack){ if(btn){ btn.disabled=false; btn.innerHTML='<span class="ad">AD</span> '+adLabel(pack.ads); } }

        function build(){
            if(!list) return; list.innerHTML="";
            PACKS.forEach(function(pack){
                var row=document.createElement("div"); row.className="sh-pack";
                var info=document.createElement("div"); info.className="pk-coins";
                info.innerHTML='<div class="pk-pile"></div><div class="pk-amt">'+pack.coins+'</div>';
                var btn=document.createElement("button"); btn.className="sh-btn";
                btn.innerHTML='<span class="ad">AD</span> '+adLabel(pack.ads);
                btn.addEventListener("click", function(){ buyPack(pack, btn); });
                row.appendChild(info); row.appendChild(btn); list.appendChild(row);
            });
        }
        function init(){
            modal=document.getElementById("freeCoinsModal");
            list =document.getElementById("shList");
            balEl=document.getElementById("shBal");
            loadEl=document.getElementById("shLoadingAd");
            loadTxt=document.getElementById("shLoadTxt");
            build();
            var close=document.getElementById("shClose");
            if(close) close.addEventListener("click", window.__bjHideFreeCoins);
            if(modal) modal.addEventListener("click", function(e){ if(e.target===modal) window.__bjHideFreeCoins(); });
        }
        window.__bjShowFreeCoins=function(){ if(!modal) return; refreshBal(); modal.style.display="flex"; };
        window.__bjHideFreeCoins=function(){ if(busy) return; if(modal) modal.style.display="none"; };
        if(document.readyState!=="loading") init(); else document.addEventListener("DOMContentLoaded",init);
    })();
    </script>
